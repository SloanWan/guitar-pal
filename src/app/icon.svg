<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
  <!-- Guitar Pal mark: six strings + playhead. Favicon version.
       Strings adapt to browser-chrome color scheme via embedded media query
       (supported by modern browsers for SVG favicons); #8A8A8A is the
       neutral fallback for engines that ignore it. Playhead stays denim. -->
  <style>
    .strings { stroke: #8A8A8A; }
    @media (prefers-color-scheme: dark)  { .strings { stroke: #C9C9C9; } }
    @media (prefers-color-scheme: light) { .strings { stroke: #3A3A3A; } }
  </style>
  <path class="strings" d="M3 4h18M3 7.2h18M3 10.4h18M3 13.6h18M3 16.8h18M3 20h18" stroke-width="1.5" stroke-linecap="square"/>
  <rect x="14" y="2" width="2" height="20" fill="#4A6FA5"/>
</svg>
